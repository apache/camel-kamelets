name: http-source-to-http-test
variables:
  - name: "id"
    value: "citrus:randomUUID()"
actions:
  - createVariables:
      variables:
        - name: "http.server.url"
          value: "http://localhost:${http.server.port}"
  # Create Camel JBang integration
  - camel:
      jbang:
        run:
          waitForRunningState: false
          integration:
            file: "http/http-source-to-http.yaml"
            systemProperties:
              properties:
                - name: "http.source.url"
                  value: "${http.server.url}"
                - name: "http.sink.url"
                  value: "${http.server.url}"

  # The http-source will poll GET /data - respond with test data
  - http:
      server: "httpServer"
      receiveRequest:
        GET:
          path: "/data"

  - http:
      server: "httpServer"
      sendResponse:
        response:
          status: 200
          reasonPhrase: "OK"
          version: "HTTP/1.1"
          contentType: "application/json"
          body:
            data: |
              { "id": "${id}", "message": "Hello from http-source" }

  # Verify the data arrives at the sink endpoint
  - http:
      server: "httpServer"
      receiveRequest:
        POST:
          path: "/result"
          body:
            data: |
              { "id": "${id}", "message": "Hello from http-source" }

  - http:
      server: "httpServer"
      sendResponse:
        response:
          status: 200
          reasonPhrase: "OK"
          version: "HTTP/1.1"
          body:
            data: "Thank You!"
