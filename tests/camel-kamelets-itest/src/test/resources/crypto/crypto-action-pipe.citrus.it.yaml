name: crypto-action-pipe-test
variables:
  - name: "crypto.algorithm"
    value: "AES"
  - name: "crypto.key"
    value: "0123456789abcdef"
  - name: "plaintext"
    value: "Camel Kamelets crypto rocks!"
actions:
  - createVariables:
      variables:
        - name: "http.server.url"
          value: "http://localhost:${http.server.port}"
  # Create Camel JBang integration
  - camel:
      jbang:
        run:
          waitForRunningState: false
          integration:
            file: "crypto/crypto-action-pipe.yaml"
            systemProperties:
              properties:
                - name: "http.sink.url"
                  value: "${http.server.url}"
                - name: "crypto.algorithm"
                  value: "${crypto.algorithm}"
                - name: "crypto.key"
                  value: "${crypto.key}"
                - name: "input"
                  value: "${plaintext}"

  # Verify Http request receives the decrypted plaintext
  - http:
      server: "httpServer"
      receiveRequest:
        POST:
          path: "/result"
          body:
            data: |
              ${plaintext}

  - http:
      server: "httpServer"
      sendResponse:
        response:
          status: 200
          reasonPhrase: "OK"
          version: "HTTP/1.1"
          body:
            data: "Thank You!"
