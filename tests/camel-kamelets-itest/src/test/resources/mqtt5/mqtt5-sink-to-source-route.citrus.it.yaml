name: mqtt5-sink-to-source-route-test
variables:
  - name: "test.message"
    value: "hello-mqtt5-test"
  - name: "mqtt.topic"
    value: "test/topic"
actions:
  # Start Mosquitto container with anonymous access
  - testcontainers:
      start:
        container:
          name: "mosquitto"
          image: "eclipse-mosquitto:2"
          exposedPorts:
            - 1883
          command: "sh -c 'echo -e \"listener 1883\\nallow_anonymous true\" > /tmp/m.conf && mosquitto -c /tmp/m.conf'"
          waitFor:
            logMessage: "mosquitto version"

  # Start source (subscriber) first
  - camel:
      jbang:
        run:
          integration:
            file: "mqtt5/mqtt5-source-route.yaml"
            systemProperties:
              properties:
                - name: "mqtt.topic"
                  value: "${mqtt.topic}"
                - name: "mqtt.brokerUrl"
                  value: "tcp://${CITRUS_TESTCONTAINERS_MOSQUITTO_HOST}:${CITRUS_TESTCONTAINERS_MOSQUITTO_PORT}"

  # Start sink (publisher)
  - camel:
      jbang:
        run:
          waitForRunningState: false
          integration:
            file: "mqtt5/mqtt5-sink-route.yaml"
            systemProperties:
              properties:
                - name: "test.message"
                  value: "${test.message}"
                - name: "mqtt.topic"
                  value: "${mqtt.topic}"
                - name: "mqtt.brokerUrl"
                  value: "tcp://${CITRUS_TESTCONTAINERS_MOSQUITTO_HOST}:${CITRUS_TESTCONTAINERS_MOSQUITTO_PORT}"

  # Verify source received the message
  - camel:
      jbang:
        verify:
          integration: "mqtt5-source-route"
          logMessage: "${test.message}"
