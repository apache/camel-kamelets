name: throttle-action-route-test
variables:
  - name: "test.message"
    value: "throttled-message-test"
actions:
  - camel:
      jbang:
        run:
          integration:
            file: "throttle/throttle-action-route.yaml"
            systemProperties:
              properties:
                - name: "test.message"
                  value: "${test.message}"
                - name: "http.sink.url"
                  value: "http://localhost:${http.server.port}"
  - http:
      server: "httpServer"
      receiveRequest:
        POST:
          path: "/result"
          body:
            data: "${test.message}"
  - http:
      server: "httpServer"
      sendResponse:
        status: 200
