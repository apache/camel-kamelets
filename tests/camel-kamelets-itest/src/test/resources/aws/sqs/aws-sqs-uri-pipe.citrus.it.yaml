name: aws-sqs-uri-pipe-test
variables:
  - name: "aws.sqs.queueName"
    value: "queue2"
  - name: "aws.sqs.message"
    value: "Hello from SQS Kamelet"
actions:
  # Create LocalStack infrastructure
  - testcontainers:
      start:
        localstack:
          services:
            - "SQS"
  - waitFor:
      http:
        url: "${CITRUS_TESTCONTAINERS_LOCALSTACK_SERVICE_URL}"

  # Create AWS-SQS client
  - camel:
      createComponent:
        name: amazonSQSClient
        file: "aws/sqs/amazonSQSClient.groovy"

  # Create Camel JBang integration
  - camel:
      jbang:
        run:
          integration:
            file: "aws/sqs/aws-sqs-uri-pipe.yaml"
          args:
            - "--prop=aws.sqs.queueName=${aws.sqs.queueName}"
            - "--prop=aws.sqs.uriEndpointOverride=${CITRUS_TESTCONTAINERS_LOCALSTACK_SERVICE_URL}"
            - "--prop=aws.sqs.overrideEndpoint=true"
            - "--prop=aws.sqs.secretKey=${CITRUS_TESTCONTAINERS_LOCALSTACK_SECRET_KEY}"
            - "--prop=aws.sqs.accessKey=${CITRUS_TESTCONTAINERS_LOCALSTACK_ACCESS_KEY}"
            - "--prop=aws.sqs.region=${CITRUS_TESTCONTAINERS_LOCALSTACK_REGION}"

  # Publish event
  - send:
      endpoint: camel:aws2-sqs://${aws.sqs.queueName}?amazonSQSClient=#amazonSQSClient
      message:
        body:
          data: "${aws.sqs.message}"

  # Verify AWS-SQS source
  - camel:
      jbang:
        verify:
          integration: "aws-sqs-uri-pipe"
          logMessage: "${aws.sqs.message}"
