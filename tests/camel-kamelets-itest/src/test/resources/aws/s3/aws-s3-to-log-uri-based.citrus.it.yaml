name: aws-s3-to-log-uri-based-test
variables:
  - name: "aws.s3.bucketNameOrArn"
    value: "bucket3"
  - name: "aws.s3.message"
    value: "Hello from S3 Kamelet"
  - name: "aws.s3.key"
    value: "hello.txt"
actions:
  # Create LocalStack infrastructure
  - testcontainers:
      start:
        localstack:
          services:
            - "S3"
  - waitFor:
      http:
        url: "${CITRUS_TESTCONTAINERS_LOCALSTACK_SERVICE_URL}"

  # Create AWS-S3 client
  - camel:
      createComponent:
        name: amazonS3Client
        file: "aws/s3/amazonS3Client.groovy"

  # Create Camel JBang integration
  - camel:
      jbang:
        run:
          integration:
            file: "aws/s3/aws-s3-to-log-uri-based.yaml"
          args:
            - "--prop=aws.s3.bucketNameOrArn=${aws.s3.bucketNameOrArn}"
            - "--prop=aws.s3.uriEndpointOverride=${CITRUS_TESTCONTAINERS_LOCALSTACK_SERVICE_URL}"
            - "--prop=aws.s3.overrideEndpoint=true"
            - "--prop=aws.s3.forcePathStyle=true"
            - "--prop=aws.s3.secretKey=${CITRUS_TESTCONTAINERS_LOCALSTACK_SECRET_KEY}"
            - "--prop=aws.s3.accessKey=${CITRUS_TESTCONTAINERS_LOCALSTACK_ACCESS_KEY}"
            - "--prop=aws.s3.region=${CITRUS_TESTCONTAINERS_LOCALSTACK_REGION}"

  # Publish event
  - send:
      endpoint: camel:aws2-s3://${aws.s3.bucketNameOrArn}?amazonS3Client=#amazonS3Client
      message:
        headers:
          - name: CamelAwsS3Key
            value: "${aws.s3.key}"
        body:
          data: "${aws.s3.message}"

  # Verify AWS-S3 source
  - camel:
      jbang:
        verify:
          integration: "aws-s3-to-log-uri-based"
          logMessage: "${aws.s3.message}"
