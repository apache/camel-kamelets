name: jira-add-issue-sink-pipe-test
variables:
  - name: "timer.source.period"
    value: "10000"
  - name: "jira.project.key"
    value: "CAMEL"
  - name: "jira.issue.assignee"
    value: "Superman"
  - name: "jira.issue.type"
    value: "Bug"
  - name: "jira.issue.description"
    value: "Sample bug"
  - name: "jira.project.id"
    value: "10001"
  - name: "jira.issue.id"
    value: "10001"
  - name: "jira.issue.key"
    value: "CAMEL-10001"
  - name: "jira.issue.summary"
    value: "New bug, citrus:randomString(10)"
  - name: "jira.username"
    value: "citrus  "
  - name: "jira.password"
    value: "secr3t"
actions:
  - createVariables:
      variables:
        - name: "jira.url"
          value: "http://localhost:${jira.server.port}"
  # Create Camel JBang integration
  - camel:
      jbang:
        run:
          integration:
            file: "jira/jira-add-issue-sink-pipe.yaml"
          args:
            - "--prop=timer.source.period=${timer.source.period}"
            - "--prop=jira.url=${jira.url}"
            - "--prop=jira.project.key=${jira.project.key}"
            - "--prop=jira.issue.key=${jira.issue.key}"
            - "--prop=jira.issue.type=${jira.issue.type}"
            - "--prop=jira.issue.assignee=${jira.issue.assignee}"
            - "--prop=jira.issue.summary=\"${jira.issue.summary}\""
            - "--prop=jira.issue.description=\"${jira.issue.description}\""
            - "--prop=jira.username=\"${jira.username}\""
            - "--prop=jira.password=\"${jira.password}\""

  # Verify issue type request
  - http:
      server: "jiraServer"
      receiveRequest:
        GET:
          path: "/rest/api/latest/issuetype"
          headers:
            - name: Authorization
              value: "Basic citrus:encodeBase64(${jira.username}:${jira.password})"

  - http:
      server: "jiraServer"
      sendResponse:
        response:
          status: 200
          reasonPhrase: "OK"
          version: "HTTP/1.1"
          contentType: "application/json"
          body:
            data: |
              [
                {
                  "self": "${jira.url}/rest/api/latest/issueType/1",
                  "id": "1",
                  "description": "A problem with the software.",
                  "iconUrl": "${jira.url}/images/icons/issuetypes/bug.png",
                  "name": "Bug",
                  "subtask": false,
                  "avatarId": 2
                },
                {
                  "self": "${jira.url}/rest/api/latest/issueType/3",
                  "id": "3",
                  "description": "A task that needs to be done.",
                  "iconUrl": "${jira.url}/images/icons/issuetypes/task.png",
                  "name": "Task",
                  "subtask": false,
                  "avatarId": 1
                }
              ]

  # Verify add issue request
  - http:
      server: "jiraServer"
      receiveRequest:
        POST:
          path: "/rest/api/latest/issue"
          headers:
            - name: Authorization
              value: "Basic citrus:encodeBase64(${jira.username}:${jira.password})"
          body:
            data: |
              {
                "fields": {
                  "project": {
                    "key": "${jira.project.key}"
                  },
                  "summary": "${jira.issue.summary}",
                  "description": "${jira.issue.description}",
                  "issuetype": {
                    "id": "1"
                  },
                  "assignee": {
                    "name": "${jira.issue.assignee}"
                  }
                },
                "properties": []
              }

  - http:
      server: "jiraServer"
      sendResponse:
        response:
          status: 200
          reasonPhrase: "OK"
          version: "HTTP/1.1"
          contentType: "application/json"
          body:
            data: |
              {
                "id": "${jira.issue.id}",
                "key": "${jira.issue.key}",
                "self": "${jira.url}/rest/api/latest/issue/${jira.issue.id}"
              }

  # Verify JIRA source
  - camel:
      jbang:
        verify:
          integration: "jira-add-issue-sink-pipe"
          logMessage: "${jira.issue.summary}"
