- route:
    from:
      uri: "kamelet:timer-source"
      parameters:
        period: 1000
        message: "Hello from Camel"
      steps:
        - to:
            uri: "kamelet:aws-polly-sink"
            parameters:
              accessKey: "The Access Key"
              secretKey: "The Secret Key"
              region: "eu-west-1"
